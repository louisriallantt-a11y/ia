<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>IA Symbolique Sans JS</title>
    <style>
        /* Système de masquage */
        .reponse { display: none; }
        
        /* Logique d'affichage par clic sur checkbox */
        #macron:checked ~ .reponse-macron { display: block; }
        #meteo:checked ~ .reponse-meteo { display: block; }
        
        body { font-family: sans-serif; padding: 50px; }
        .input-box { margin-bottom: 20px; }
    </style>
</head>
<body>

    <h1>Mon IA Symbolique (Statique)</h1>
    
    <div class="input-box">
        <label>Que cherchez-vous ?</label><br>
        <!-- Les cases à cocher servent de boutons de recherche -->
        <input type="radio" name="search" id="macron"> <label for="macron">Qui est le président ?</label><br>
        <input type="radio" name="search" id="meteo"> <label for="meteo">Quel temps fait-il ?</label>
    </div>

    <hr>

    <!-- Zone de réponse : Tu écris tes variantes ici, elles sont affichées selon le clic -->
    <div class="reponse reponse-macron">
        <p><strong>Option 1 :</strong> Emmanuel Macron est le président de la République.</p>
        <p><strong>Option 2 :</strong> C'est actuellement Emmanuel Macron qui dirige la France.</p>
    </div>

    <div class="reponse reponse-meteo">
        <p><strong>Option 1 :</strong> Il fait beau sur Contes.</p>
        <p><strong>Option 2 :</strong> Le ciel est dégagé aujourd'hui à Contes.</p>
    </div>

</body>
</html>
