<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>IA Symbolique Pure</title>
    <style>
        /* La structure de la réponse est définie ici comme un assemblage de morceaux */
        .resultat::after {
            content: attr(data-sujet) " est le " attr(data-role) " de la " attr(data-lieu) ".";
            display: block;
            padding: 10px;
            background: #eee;
        }

        /* Masquage initial */
        .resultat { display: none; }

        /* Affichage au clic */
        #macron:target ~ .reponse-macron { display: block; }
    </style>
</head>
<body>

    <div id="data-macron" 
         data-sujet="Emmanuel Macron" 
         data-role="président" 
         data-lieu="République française">
    </div>

    <h1>Interface IA</h1>
    <input type="text" placeholder="Tapez 'macron'...">
    <a href="#macron"><button>Générer</button></a>

    <div id="macron" class="resultat reponse-macron" 
         data-sujet="Emmanuel Macron" 
         data-role="président" 
         data-lieu="République française">
    </div>

</body>
</html>
